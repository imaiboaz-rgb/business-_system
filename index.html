<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enterprise POS v5</title>

<style>
body{margin:0;font-family:Segoe UI;background:#0b1220;color:#fff}
header{padding:16px;text-align:center;background:linear-gradient(135deg,#2563eb,#7c3aed)}
.container{max-width:1100px;margin:auto;padding:15px}
.card{background:#111827;padding:15px;margin-bottom:10px;border-radius:10px}
input,select,button{width:100%;padding:10px;margin-top:8px;border-radius:8px;border:1px solid #334155;background:#0b1220;color:#fff}
button{background:#2563eb;border:none;cursor:pointer}
button:hover{background:#1d4ed8}
.hidden{display:none}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{padding:8px;border-bottom:1px solid #1f2937}
.badge{padding:4px 8px;border-radius:6px;font-size:12px}
.low{background:#f59e0b}
.out{background:#ef4444}
.ok{background:#22c55e}
</style>
</head>

<body>

<header>
<h2>Enterprise POS v5</h2>
</header>

<div class="container">

<!-- LOGIN -->
<div class="card" id="loginBox">
<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="signup()" style="background:#7c3aed">Sign Up</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="card">
<h3 id="userInfo"></h3>
<button onclick="logout()" style="background:red">Logout</button>
</div>

<!-- PRODUCTS -->
<div class="card">
<h3>Inventory</h3>
<table>
<thead><tr><th>Product</th><th>Price</th><th>Stock</th><th>Status</th></tr></thead>
<tbody id="productTable"></tbody>
</table>
</div>

<!-- SALE -->
<div class="card">
<h3>Make Sale</h3>

<select id="productSelect"></select>
<input id="qty" type="number" placeholder="Quantity">

<select id="payment">
<option>cash</option>
<option>mpesa</option>
<option>card</option>
</select>

<input id="deposit" type="number" placeholder="Deposit">

<button onclick="makeSale()">Complete Sale</button>
</div>

<!-- RECEIPT -->
<div class="card">
<h3>Last Receipt</h3>
<pre id="receipt"></pre>
</div>

<!-- ADMIN ONLY -->
<div class="card" id="adminPanel">
<h3>Admin Stock Approvals</h3>
<div id="requests"></div>
</div>

</div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

// ===== FIREBASE CONFIG =====
const firebaseConfig = {
  apiKey: "AIzaSyDH1sF1FEasvvisSp-B8m2ETk2N5L4rZq8",
  authDomain: "business-pro-d657d.firebaseapp.com",
  projectId: "business-pro-d657d",
  storageBucket: "business-pro-d657d.firebasestorage.app",
  messagingSenderId: "200900065407",
  appId: "1:200900065407:web:1f476c5ecab0fe59b6a74a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let user, role="cashier";

// ===== AUTH =====
auth.onAuthStateChanged(async u=>{
  if(!u){
    location.reload();
    return;
  }

  user=u;

  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  document.getElementById("userInfo").innerText=u.email;

  const doc=await db.collection("users").doc(u.uid).get();
  role=doc.data()?.role || "cashier";

  if(role!=="admin"){
    document.getElementById("adminPanel").style.display="none";
  }

  load();
});

// ===== LOGIN =====
async function login(){
  await auth.signInWithEmailAndPassword(email.value,password.value);
}

async function signup(){
  const res=await auth.createUserWithEmailAndPassword(email.value,password.value);
  await db.collection("users").doc(res.user.uid).set({role:"cashier"});
}

// ===== LOAD =====
function load(){
  db.collection("products").onSnapshot(s=>{
    let html="", opt="";

    s.forEach(d=>{
      let p=d.data();

      let status="ok";
      if(p.stock<=0) status="out";
      else if(p.stock<=10) status="low";

      html+=`
      <tr>
        <td>${p.name}</td>
        <td>${p.price}</td>
        <td>${p.stock}</td>
        <td><span class="badge ${status}">${status}</span></td>
      </tr>`;

      opt+=`<option value="${d.id}">${p.name}</option>`;
    });

    productTable.innerHTML=html;
    productSelect.innerHTML=opt;
  });
}

// ===== SALE WITH DEPOSIT =====
async function makeSale(){
  const id=productSelect.value;
  const qty=+qty.value;
  const dep=+deposit.value||0;
  const method=payment.value;

  const p=await db.collection("products").doc(id).get();
  const data=p.data();

  const total=data.price*qty;
  const balance=total-dep;

  await db.collection("sales").add({
    product:data.name,
    qty,
    total,
    deposit:dep,
    balance,
    payment:method,
    uid:user.uid
  });

  document.getElementById("receipt").innerText=`
PRODUCT: ${data.name}
QTY: ${qty}
TOTAL: ${total}
DEPOSIT: ${dep}
BALANCE: ${balance}
PAYMENT: ${method}
`;

  alert("Sale complete");
}

function logout(){auth.signOut();}
</script>

</body>
</html>
