<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enterprise POS v6 - Approval System</title>

<style>
body{margin:0;font-family:Segoe UI;background:#0b1220;color:#e5e7eb}
header{padding:16px;text-align:center;background:linear-gradient(135deg,#2563eb,#7c3aed)}
.container{max-width:1100px;margin:auto;padding:16px}

.card{background:#111827;padding:16px;margin-bottom:12px;border-radius:12px}

input,select,button{
width:100%;padding:10px;margin-top:8px;border-radius:8px;
border:1px solid #334155;background:#0b1220;color:#fff}

button{background:#2563eb;border:none;cursor:pointer;font-weight:600}
button:hover{background:#1d4ed8}

.hidden{display:none}

table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{padding:10px;border-bottom:1px solid #1f2937}
th{background:#111827}

.badge{padding:4px 8px;border-radius:6px;font-size:12px}
.pending{background:#f59e0b}
.approved{background:#22c55e}
.rejected{background:#ef4444}
</style>
</head>

<body>

<header>
<h2>Enterprise POS v6 (Admin Approval System)</h2>
</header>

<div class="container">

<!-- LOGIN -->
<div id="loginBox" class="card">
<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="signup()" style="background:#7c3aed">Sign Up</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="card">
<h3 id="userInfo"></h3>
<button onclick="logout()" style="background:#ef4444">Logout</button>
</div>

<!-- INVENTORY -->
<div class="card">
<h3>Inventory</h3>
<table>
<thead>
<tr><th>Name</th><th>Price</th><th>Stock</th></tr>
</thead>
<tbody id="productTable"></tbody>
</table>
</div>

<!-- CASHIER REQUEST STOCK -->
<div class="card">
<h3>Request Stock Change (Cashier)</h3>

<select id="productSelect"></select>
<input id="newStock" type="number" placeholder="Requested Stock">
<input id="reason" placeholder="Reason (optional)">
<button onclick="requestStock()">Send Request</button>
</div>

<!-- SALES -->
<div class="card">
<h3>Make Sale</h3>
<select id="saleProduct"></select>
<input id="qty" type="number" placeholder="Quantity">
<button onclick="makeSale()">Sell</button>
</div>

<!-- ADMIN PANEL -->
<div class="card" id="adminPanel">
<h3>Admin Approval Panel</h3>
<div id="requests"></div>
</div>

<!-- RECEIPT -->
<div class="card">
<h3>Receipt</h3>
<pre id="receipt"></pre>
</div>

</div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDH1sF1FEasvvisSp-B8m2ETk2N5L4rZq8",
  authDomain: "business-pro-d657d.firebaseapp.com",
  projectId: "business-pro-d657d",
  storageBucket: "business-pro-d657d.firebasestorage.app",
  messagingSenderId: "200900065407",
  appId: "1:200900065407:web:1f476c5ecab0fe59b6a74a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let role = "cashier";

// ================= AUTH =================
auth.onAuthStateChanged(async u=>{
  if(u){
    loginBox.classList.add("hidden");
    app.classList.remove("hidden");

    userInfo.innerText = u.email;

    const userDoc = await db.collection("users").doc(u.uid).get();
    role = userDoc.data()?.role || "cashier";

    if(role !== "admin"){
      document.getElementById("adminPanel").style.display = "none";
    } else {
      listenRequests();
    }

    loadProducts();
  }
});

async function login(){
  await auth.signInWithEmailAndPassword(email.value,password.value);
}

async function signup(){
  const res = await auth.createUserWithEmailAndPassword(email.value,password.value);

  await db.collection("users").doc(res.user.uid).set({
    role:"cashier"
  });
}

function logout(){auth.signOut();}

// ================= PRODUCTS =================
function loadProducts(){
  db.collection("products").onSnapshot(s=>{
    let html="";
    let options="";

    s.forEach(d=>{
      const p=d.data();

      html+=`<tr><td>${p.name}</td><td>${p.price}</td><td>${p.stock}</td></tr>`;
      options+=`<option value="${d.id}">${p.name}</option>`;
    });

    productSelect.innerHTML=options;
    saleProduct.innerHTML=options;
    productTable.innerHTML=html;
  });
}

// ================= CASHIER REQUEST STOCK =================
async function requestStock(){
  const id = productSelect.value;

  const p = await db.collection("products").doc(id).get();

  await db.collection("stockRequests").add({
    productId:id,
    productName:p.data().name,
    oldStock:p.data().stock,
    newStock:+newStock.value,
    reason:reason.value,
    status:"pending",
    requestedBy:auth.currentUser.uid,
    createdAt:firebase.firestore.FieldValue.serverTimestamp()
  });

  alert("Request sent to admin");
}

// ================= ADMIN APPROVAL =================
function listenRequests(){
  db.collection("stockRequests")
    .where("status","==","pending")
    .onSnapshot(s=>{
      let html="";

      s.forEach(d=>{
        const r=d.data();

        html+=`
        <div class="card">
          <b>${r.productName}</b><br>
          Old: ${r.oldStock} → New: ${r.newStock}<br>
          Reason: ${r.reason || "none"}<br>

          <button onclick="approve('${d.id}','${r.productId}',${r.newStock})"
            style="background:#22c55e;margin-top:6px">
            Approve
          </button>

          <button onclick="reject('${d.id}')"
            style="background:#ef4444;margin-top:6px">
            Reject
          </button>
        </div>`;
      });

      requests.innerHTML = html;
    });
}

async function approve(id,productId,newStock){
  const batch = db.batch();

  batch.update(db.collection("products").doc(productId),{
    stock:newStock
  });

  batch.update(db.collection("stockRequests").doc(id),{
    status:"approved"
  });

  await batch.commit();

  alert("Stock approved");
}

async function reject(id){
  await db.collection("stockRequests").doc(id).update({
    status:"rejected"
  });

  alert("Rejected");
}

// ================= SALES =================
async function makeSale(){
  const id = saleProduct.value;
  const qty = +document.getElementById("qty").value;

  const p = await db.collection("products").doc(id).get();

  const total = p.data().price * qty;

  await db.collection("sales").add({
    product:p.data().name,
    qty,
    total,
    date:new Date().toISOString()
  });

  receipt.innerText =
`RECEIPT
-----------------
Item: ${p.data().name}
Qty: ${qty}
Total: ${total}`;

  alert("Sale completed");
}

</script>
</body>
</html>
