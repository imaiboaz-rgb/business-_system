<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enterprise POS v2 - GitHub Ready</title>  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:Segoe UI,Arial;background:#0b1220;color:#e5e7eb}
    header{padding:16px;text-align:center;background:linear-gradient(135deg,#2563eb,#7c3aed)}
    header h1{margin:0;font-size:22px}

    .container{max-width:1100px;margin:auto;padding:16px}

    .card{background:#111827;padding:16px;border-radius:12px;margin-bottom:12px;border:1px solid #1f2937}

    input,button{width:100%;padding:10px;margin-top:8px;border-radius:8px;border:1px solid #334155;background:#0b1220;color:#fff}

    button{background:#2563eb;border:none;font-weight:600;cursor:pointer}
    button:hover{background:#1d4ed8}

    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

    table{width:100%;border-collapse:collapse;margin-top:10px}
    th,td{padding:10px;border-bottom:1px solid #1f2937}
    th{background:#111827}

    .hidden{display:none}
    .top{display:flex;justify-content:space-between;align-items:center}

    .toast{position:fixed;bottom:20px;right:20px;background:#111827;padding:10px 14px;border-radius:8px;opacity:0;transition:.3s}
    .toast.show{opacity:1}
  </style></head>
<body><header>
  <h1>Enterprise POS v2</h1>
</header><div class="container">  <!-- LOGIN -->  <div id="loginBox" class="card">
    <h3>Login</h3>
    <input id="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Password" />
    <button onclick="login()">Sign In</button>
    <button onclick="signup()" style="margin-top:8px;background:#7c3aed">Create Account</button>
  </div>  <!-- APP -->  <div id="app" class="hidden"><div class="top">
  <div id="user"></div>
  <button onclick="logout()" style="width:auto;background:#ef4444">Logout</button>
</div>

<div class="card">
  <h3>Add Product</h3>
  <input id="pName" placeholder="Name" />
  <div class="row">
    <input id="pPrice" type="number" placeholder="Price" />
    <input id="pStock" type="number" placeholder="Stock" />
  </div>
  <button onclick="addProduct()">Add</button>
</div>

<div class="card">
  <h3>Products</h3>
  <table>
    <thead><tr><th>Name</th><th>Price</th><th>Stock</th></tr></thead>
    <tbody id="products"></tbody>
  </table>
</div>

  </div></div><div class="toast" id="toast"></div><!-- Firebase --><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script><script>

// ===== FIREBASE CONFIG (YOUR PROJECT) =====
const firebaseConfig = {
  apiKey: "AIzaSyDH1sF1FEasvvisSp-B8m2ETk2N5L4rZq8",
  authDomain: "business-pro-d657d.firebaseapp.com",
  projectId: "business-pro-d657d",
  storageBucket: "business-pro-d657d.firebasestorage.app",
  messagingSenderId: "200900065407",
  appId: "1:200900065407:web:1f476c5ecab0fe59b6a74a",
  measurementId: "G-ZM7PHG8FRM"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let user = null;
let products = [];

// AUTH
auth.onAuthStateChanged(u => {
  user = u;
  if (u) {
    loginBox.classList.add('hidden');
    app.classList.remove('hidden');
    user.innerText = u.email;
    load();
  } else {
    loginBox.classList.remove('hidden');
    app.classList.add('hidden');
  }
});

async function login() {
  try {
    await auth.signInWithEmailAndPassword(email.value, password.value);
    toast("Logged in");
  } catch (e) { toast(e.message); }
}

async function signup() {
  try {
    await auth.createUserWithEmailAndPassword(email.value, password.value);
    toast("Account created");
  } catch (e) { toast(e.message); }
}

function logout() {
  auth.signOut();
}

// PRODUCTS
async function addProduct() {
  if (!user) return;

  await db.collection("products").add({
    name: pName.value,
    price: +pPrice.value,
    stock: +pStock.value,
    uid: user.uid
  });

  toast("Product added");
}

function load() {
  db.collection("products")
    .where("uid", "==", user.uid)
    .onSnapshot(snap => {
      products = snap.docs.map(d => d.data());
      render();
    });
}

function render() {
  products.innerHTML = products.map(p => `
    <tr>
      <td>${p.name}</td>
      <td>${p.price}</td>
      <td>${p.stock}</td>
    </tr>
  `).join('');
}

function toast(msg) {
  toastEl.innerText = msg;
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), 2000);
}

const toastEl = document.getElementById('toast');

</script></body>
</html>
