<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business System</title>

<style>
*{box-sizing:border-box}
body{font-family:sans-serif;margin:0;background:#f5f5f7}

.topbar{padding:10px;background:#111;color:#fff;display:flex;gap:10px}
.topbar select,.topbar button{padding:8px;border-radius:8px;border:none}

.header{padding:15px;background:#007aff;color:white}

.content{padding:15px}
.card{background:white;padding:15px;border-radius:12px;margin-bottom:10px}

input{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:1px solid #ccc}

.btn{width:100%;padding:12px;background:#007aff;color:white;border:none;border-radius:10px}

.item{background:#eee;padding:10px;border-radius:10px;margin-top:5px;display:flex;justify-content:space-between}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:black;color:white;padding:10px;border-radius:8px;opacity:0;transition:.3s}
.toast.show{opacity:1}
</style>
</head>

<body>

<div class="topbar">
<select id="businessSelect"></select>
<button onclick="addBusiness()">➕</button>
</div>

<div class="header">
<h2 id="bizName">Business</h2>
</div>

<div class="content">

<div class="card">
<h3>Add Sale</h3>
<input id="product" placeholder="Product name">
<input id="qty" type="number" placeholder="Qty">
<input id="price" type="number" placeholder="Price">
<input id="discount" type="number" placeholder="Discount (optional)">
<button class="btn" onclick="addSale()">Save Sale</button>
</div>

<div class="card">
<h3>Add Product (Price Control)</h3>
<input id="pname" placeholder="Product name">
<input id="minPrice" placeholder="Min price">
<input id="maxPrice" placeholder="Max price">
<button class="btn" onclick="addProduct()">Add Product</button>
</div>

<div class="card">
<h3>Add Member</h3>
<input id="mname" placeholder="Name">
<input id="mphone" placeholder="WhatsApp (07...)">
<input id="memail" placeholder="Email">
<button class="btn" onclick="addMember()">Add Member</button>

<div id="members"></div>
</div>

</div>

<div id="toast" class="toast"></div>

<script>

// ===== BUSINESS SYSTEM =====
let businesses = JSON.parse(localStorage.getItem('biz')) || [{id:1,name:'Default'}];
let currentBiz = localStorage.getItem('currentBiz') || 1;

let members = JSON.parse(localStorage.getItem('members_'+currentBiz)) || [];
let sales = JSON.parse(localStorage.getItem('sales_'+currentBiz)) || [];
let stock = JSON.parse(localStorage.getItem('stock_'+currentBiz)) || [];

function saveAll(){
localStorage.setItem('members_'+currentBiz, JSON.stringify(members));
localStorage.setItem('sales_'+currentBiz, JSON.stringify(sales));
localStorage.setItem('stock_'+currentBiz, JSON.stringify(stock));
}

// ===== BUSINESS =====
function loadBiz(){
let biz = businesses.find(b=>b.id==currentBiz);
document.getElementById('bizName').innerText = biz ? biz.name : "Business";
}

function switchBusiness(){
currentBiz = document.getElementById('businessSelect').value;
localStorage.setItem('currentBiz', currentBiz);
location.reload();
}

function addBusiness(){
let name = prompt("Business name?");
if(!name) return;

let id = Date.now();
businesses.push({id,name});
localStorage.setItem('biz', JSON.stringify(businesses));
localStorage.setItem('currentBiz', id);
location.reload();
}

// ===== MEMBER FIX =====
function formatPhone(phone){
phone = phone.replace(/\D/g,'');
if(phone.startsWith('0')) phone = '254'+phone.slice(1);
return phone;
}

function addMember(){
if(!mname.value || !mphone.value){
showToast("Name & phone required");
return;
}

let m = {
id:Date.now(),
name:mname.value,
phone:formatPhone(mphone.value),
email:memail.value,
active:true
};

members.push(m);
saveAll();
renderMembers();

showToast("Member added (WhatsApp ready)");
}

function renderMembers(){
members = JSON.parse(localStorage.getItem('members_'+currentBiz)) || [];

document.getElementById('members').innerHTML = members.map(m=>`
<div class="item">
<div>${m.name}<br><small>${m.phone}</small></div>
<div onclick="toggle(${m.id})">${m.active?'🟢':'⚪'}</div>
</div>
`).join('');
}

function toggle(id){
let m = members.find(x=>x.id==id);
m.active=!m.active;
saveAll();
renderMembers();
}

// ===== PRODUCT =====
function addProduct(){
if(!pname.value || !minPrice.value || !maxPrice.value){
showToast("Fill all product fields");
return;
}

stock.push({
name:pname.value,
min:+minPrice.value,
max:+maxPrice.value
});

saveAll();
showToast("Product added with price control");
}

// ===== SALE =====
function addSale(){
let p = product.value;
let q = +qty.value;
let price = +priceInput();

let discount = +document.getElementById('discount').value || 0;

let item = stock.find(s=>s.name === p);

if(item){
if(price < item.min || price > item.max){
showToast("Price out of allowed range");
return;
}
}

let total = (q*price) - discount;

sales.push({p,q,price,discount,total});
saveAll();

notifyMembers(p, total);

showToast("Sale saved");
}

// fix id conflict
function priceInput(){
return document.getElementById('price').value;
}

// ===== WHATSAPP NOTIFY =====
function notifyMembers(product,total){
let active = members.filter(m=>m.active);

if(active.length===0) return;

let msg = `New Sale\nProduct: ${product}\nTotal: ${total}`;

window.open(`https://wa.me/${active[0].phone}?text=${encodeURIComponent(msg)}`);
}

// ===== UI =====
function showToast(msg){
let t=document.getElementById('toast');
t.innerText=msg;
t.classList.add('show');
setTimeout(()=>t.classList.remove('show'),2000);
}

function init(){
document.getElementById('businessSelect').innerHTML =
businesses.map(b=>`<option value="${b.id}" ${b.id==currentBiz?'selected':''}>${b.name}</option>`).join('');

document.getElementById('businessSelect').onchange = switchBusiness;

loadBiz();
renderMembers();
}

init();

</script>

</body>
</html>
