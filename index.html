<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Enterprise POS v4</title>

<style>
body{margin:0;font-family:Segoe UI;background:#0b1220;color:#e5e7eb}
header{padding:15px;text-align:center;background:linear-gradient(135deg,#2563eb,#7c3aed)}
.container{max-width:1100px;margin:auto;padding:15px}
.card{background:#111827;padding:15px;margin-bottom:10px;border-radius:10px}
input,select,button{width:100%;padding:10px;margin-top:8px;border-radius:8px;border:1px solid #334155;background:#0b1220;color:#fff}
button{background:#2563eb;border:none;cursor:pointer}
button:hover{background:#1d4ed8}
.hidden{display:none}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{padding:8px;border-bottom:1px solid #1f2937}
</style>
</head>

<body>

<header>
<h2>Enterprise POS v4</h2>
</header>

<div class="container">

<!-- LOGIN -->
<div id="loginBox" class="card">
<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="signup()" style="background:#7c3aed">Sign Up</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="card">
<h3 id="userInfo"></h3>
<button onclick="logout()" style="background:#ef4444">Logout</button>
</div>

<!-- PRODUCTS -->
<div class="card">
<h3>Products</h3>
<table>
<thead>
<tr><th>Name</th><th>Price</th><th>Stock</th></tr>
</thead>
<tbody id="productTable"></tbody>
</table>
</div>

<!-- MAKE SALE -->
<div class="card">
<h3>Make Sale</h3>

<select id="productSelect"></select>
<input id="qty" type="number" placeholder="Quantity">

<select id="paymentMethod">
<option value="cash">Cash</option>
<option value="mpesa">M-Pesa</option>
<option value="card">Card</option>
</select>

<input id="deposit" type="number" placeholder="Deposit (optional)">

<button onclick="makeSale()">Complete Sale</button>
</div>

<!-- STOCK REQUEST (CASHIER) -->
<div class="card">
<h3>Request Stock Change</h3>
<select id="reqProduct"></select>
<input id="reqStock" type="number" placeholder="New Stock">
<button onclick="requestStock()">Send Request</button>
</div>

<!-- ADMIN PANEL -->
<div class="card" id="adminPanel">
<h3>Admin Stock Approvals</h3>
<div id="requests"></div>
</div>

</div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

// 🔥 FIREBASE CONFIG (YOUR PROJECT)
const firebaseConfig = {
  apiKey: "AIzaSyDH1sF1FEasvvisSp-B8m2ETk2N5L4rZq8",
  authDomain: "business-pro-d657d.firebaseapp.com",
  projectId: "business-pro-d657d",
  storageBucket: "business-pro-d657d.firebasestorage.app",
  messagingSenderId: "200900065407",
  appId: "1:200900065407:web:1f476c5ecab0fe59b6a74a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let user=null;
let role="cashier";

// AUTH
auth.onAuthStateChanged(async u=>{
  if(u){
    user=u;
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");

    document.getElementById("userInfo").innerText=u.email;

    const doc=await db.collection("users").doc(u.uid).get();
    role=doc.data()?.role || "cashier";

    if(role!=="admin"){
      document.getElementById("adminPanel").style.display="none";
    }

    loadProducts();
    loadRequests();
  }else{
    location.reload();
  }
});

// LOGIN
async function login(){
  await auth.signInWithEmailAndPassword(email.value,password.value);
}

async function signup(){
  const res=await auth.createUserWithEmailAndPassword(email.value,password.value);

  await db.collection("users").doc(res.user.uid).set({
    role:"cashier"
  });
}

// PRODUCTS
function loadProducts(){
  db.collection("products").onSnapshot(s=>{
    let html="";
    let options="";

    s.forEach(d=>{
      let p=d.data();

      html+=`<tr><td>${p.name}</td><td>${p.price}</td><td>${p.stock}</td></tr>`;
      options+=`<option value="${d.id}">${p.name}</option>`;
    });

    productTable.innerHTML=html;
    productSelect.innerHTML=options;
    reqProduct.innerHTML=options;
  });
}

// SALE
async function makeSale(){
  const id=productSelect.value;
  const qty=+document.getElementById("qty").value;
  const method=paymentMethod.value;
  const deposit=+document.getElementById("deposit").value||0;

  const p=await db.collection("products").doc(id).get();
  const data=p.data();

  const total=data.price*qty;
  const balance=total-deposit;

  await db.collection("sales").add({
    product:data.name,
    qty,
    total,
    paymentMethod:method,
    deposit,
    balance,
    uid:user.uid
  });

  alert("Sale complete");
}

// STOCK REQUEST
async function requestStock(){
  await db.collection("stockRequests").add({
    productId:reqProduct.value,
    newStock:+reqStock.value,
    uid:user.uid,
    status:"pending"
  });

  alert("Request sent");
}

// ADMIN APPROVAL
function loadRequests(){
  db.collection("stockRequests").onSnapshot(s=>{
    let html="";

    s.forEach(async d=>{
      let r=d.data();

      if(r.status==="pending"){
        html+=`
        <div>
          Product: ${r.productId} | New Stock: ${r.newStock}
          <button onclick="approve('${d.id}','${r.productId}',${r.newStock})">Approve</button>
        </div>`;
      }
    });

    requests.innerHTML=html;
  });
}

async function approve(id,productId,newStock){
  await db.collection("products").doc(productId).update({
    stock:newStock
  });

  await db.collection("stockRequests").doc(id).update({
    status:"approved"
  });

  alert("Approved");
}

function logout(){auth.signOut();}

</script>
</body>
</html>
